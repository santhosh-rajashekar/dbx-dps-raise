# ============================================================
# ADOIT Data Product — Databricks Asset Bundle
# Domain: Enterprise Architecture | Catalog: adoit_product
# ============================================================
# Catalog and schemas are created by the setup notebook (00_Adoit_Setup)
# rather than by bundle resources, to avoid needing CREATE CATALOG
# permissions on the service principal at the metastore level.
# ============================================================

bundle:
  name: dbx-dps-raise
  engine: direct

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405605730069993.13.azuredatabricks.net

  prod:
    mode: production
    workspace:
      host: https://adb-7405605730069993.13.azuredatabricks.net
    permissions:
      - user_name: skarotirajashekar@godevsuite060.onmicrosoft.com
        level: CAN_MANAGE
